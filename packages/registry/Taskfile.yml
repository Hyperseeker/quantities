version: "3"

tasks:
    build:
        desc: Build registry package
        cmds:
            - bun run build

    typecheck:
        desc: Typecheck registry package
        cmds:
            - bun run typecheck

    test:
        desc: Test registry package
        cmds:
            - bun run test

    lint:
        desc: Lint registry package
        cmds:
            - bun run lint

    format:
        desc: Format registry package
        cmds:
            - bun run format

    format:check:
        desc: Check formatting of registry package
        cmds:
            - bun run format:check

    ci:
        desc: Run all CI checks
        cmds:
            - task: typecheck
            - task: lint
            - task: format:check
